spring.application.name=flowtide-consumer
server.port=8082

# Points to FlowTide broker's internal TCP registry
kafka.registry.host=localhost
kafka.registry.port=7070
kafka.broker.host=localhost
kafka.broker.port=9092

# Consumer offsets are persisted by the consumer service (not the broker)
kafka.offsets.persist-path=data/consumer-offsets.json

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

management.endpoints.web.exposure.include=health,info,metrics
