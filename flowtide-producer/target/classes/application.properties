spring.application.name=flowtide-producer
server.port=8081

# Eureka — registers this producer with the service registry so the gateway can route to it,
# and fetches the registry so BrokerClient can discover flowtide-broker instances.
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# How often (seconds) to re-fetch the Eureka registry (default 30).
# Lower value means the producer discovers newly-started broker instances faster.
eureka.client.registry-fetch-interval-seconds=10

management.endpoints.web.exposure.include=health,info,metrics
