spring.application.name=KafkaProject

kafka.registry.start=true
kafka.registry.host=localhost
kafka.registry.port=7070
kafka.registry.thread-pool-size=5


kafka.broker.host=localhost
kafka.broker.port=9092
kafka.broker.thread-pool-size=10


kafka.producer.thread-pool-size=8


kafka.topic.default-partitions=3
kafka.topic.default-replication-factor=2

kafka.backpressure.max-total-events=5000000
kafka.backpressure.max-total-bytes=1073741824
kafka.backpressure.retry-after-seconds=5

kafka.cluster.heartbeat-interval-ms=5000
kafka.cluster.node-timeout-ms=15000


kafka.retention.check-interval-ms=60000

kafka.offsets.persist-path=data/offsets.json


management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}


logging.level.com.bounteous=INFO
logging.level.AUDIT=INFO
