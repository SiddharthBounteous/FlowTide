spring.application.name=flowtide-broker
# Use 0 so Spring picks a free port automatically.
# Pass -Dserver.port=8083 (or 8084, 8085…) on the command line to pin a specific port.
server.port=0
server.host=localhost

kafka.topic.default-partitions=3
kafka.topic.default-replication-factor=2

kafka.backpressure.max-total-events=5000000
kafka.backpressure.max-total-bytes=1073741824
kafka.backpressure.retry-after-seconds=5

kafka.cluster.heartbeat-interval-ms=5000
kafka.cluster.node-timeout-ms=15000

kafka.retention.check-interval-ms=60000

# Replication — how often follower brokers poll the leader for new events
kafka.replication.poll-interval-ms=1000

kafka.offsets.persist-path=data/offsets.json

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

logging.level.com.bounteous=INFO
logging.level.AUDIT=INFO

# Eureka client — registers this broker with the service registry
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# Each instance must have a unique ID so Eureka treats them as separate nodes.
# Using a random UUID means every restart gets a fresh ID (safe for dev/test).
eureka.instance.instance-id=${spring.application.name}:${random.uuid}
